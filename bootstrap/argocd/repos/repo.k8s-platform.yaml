# Git platform repo (public HTTPS — no password in Git).
# URL must match gitops/clusters/*/ Application repoURL and AppProject sourceRepos.

apiVersion: v1
kind: Secret
metadata:
  name: repo-k8s-platform
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/arutselvan15/k8s-platform.git
  name: k8s-platform
