# GitHub repo-creds (PAT). Requires ${GITHUB_PAT} in bootstrap/env/bootstrap.env.
apiVersion: v1
kind: Secret
metadata:
  name: repo-creds-github-com
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  url: https://github.com
  username: git
  password: ${GITHUB_PAT}
