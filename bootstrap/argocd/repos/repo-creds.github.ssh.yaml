# GitHub repo-creds (SSH). Requires ${GITHUB_SSH_PRIVATE_KEY_B64} in bootstrap/env/bootstrap.env.
apiVersion: v1
kind: Secret
metadata:
  name: repo-creds-github-com
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  url: ssh://git@github.com
data:
  sshPrivateKey: ${GITHUB_SSH_PRIVATE_KEY_B64}

