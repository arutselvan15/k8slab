# Kind dev — enable ingress + local TLS (cert-manager secret argocd-server-tls).
# /etc/hosts: 127.0.0.1 argocd.dev → https://argocd.dev:8443
# Re-run ./bootstrap/bootstrap.sh dev after Certificate is Ready.

configs:
  params:
    server.insecure: true
    url: https://argocd.dev:8443

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.dev
    tls: true
    secretName: argocd-server-tls
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
