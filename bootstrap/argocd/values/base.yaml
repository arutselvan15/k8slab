# Shared Argo CD Helm values (all environments).
# Environment-specific: values/overlays/<profile>.yaml (hostname, url, TLS secret, enabled).

global:
  domain: argocd.dev

configs:
  params:
    # Overlays set server.insecure and url per environment.

server:
  service:
    type: ClusterIP
  ingress:
    enabled: false
    ingressClassName: nginx
    path: /
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: HTTP

controller:
  replicas: 1

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

redis:
  enabled: true
