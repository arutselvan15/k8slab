# Seed Application for dev core platform — applied by scripts/gitops-start.sh (Day 2), not bootstrap.
#
#   ./scripts/gitops-start.sh dev
#
# Creates Application "core-apps", which syncs gitops/clusters/dev/core/applications/.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/arutselvan15/k8s-platform.git
    targetRevision: HEAD
    path: gitops/clusters/dev/core/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
