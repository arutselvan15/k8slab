# Seed Application for dev core platform — apply once (not self-managed from Git).
#
#   kubectl apply -f gitops/clusters/dev/core.application.yaml
#
# Creates Application "core-apps", which syncs gitops/clusters/dev/core/.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/arutselvan15/k8s-platform.git
    targetRevision: HEAD
    path: gitops/clusters/dev/core
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
