# cert-manager CRs for core platform — gitops/clusters/dev/core/certificates/ (not under core-apps path).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-certificates
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: core
  source:
    repoURL: https://github.com/arutselvan15/k8s-platform.git
    targetRevision: HEAD
    path: gitops/clusters/dev/core/certificates
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
