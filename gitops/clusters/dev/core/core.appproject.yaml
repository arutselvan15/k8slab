# Keep sourceRepos in sync with bootstrap/argocd/gitops-repo.env and Application repoURLs.

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Platform core components (ingress, certificates, shared infra)
  sourceRepos:
    - https://github.com/arutselvan15/k8s-platform.git
    - https://kubernetes.github.io/ingress-nginx
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
