# TLS for Argo CD ingress — secret must match bootstrap/argocd/values/overlays/dev.yaml server.ingress.secretName.
# When Ready: ./bootstrap/bootstrap.sh dev

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: argocd-server-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - argocd.dev
