# Replace repoURL with this repository (HTTPS or SSH) before syncing.
# Argo CD must have the repo registered (Settings → Repositories).
#
# One-time if not using a remote yet:
#   argocd repo add https://github.com/YOUR_ORG/k8s-platform.git
#
# Apply:
#   kubectl apply -f gitops/clusters/dev/ingress-nginx.application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.12.1
      helm:
        releaseName: ingress-nginx
        valueFiles:
          - $values/gitops/apps/ingress-nginx/values.yaml
    - repoURL: https://github.com/arutselvan15/k8s-platform.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
