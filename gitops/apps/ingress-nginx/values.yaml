# Kind dev: hostPort 80/443 on the node matches infra/kind/*-cluster.yaml extraPortMappings
# (host 8080/8443 → container 80/443).

controller:
  ingressClassResource:
    name: nginx
    default: true
    controllerValue: k8s.io/ingress-nginx
  watchIngressWithoutClass: true
  hostPort:
    enabled: true
  service:
    type: ClusterIP
  metrics:
    enabled: false
